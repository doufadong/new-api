name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: 构建 + 推送镜像到 GitHub Container Registry (GHCR)
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Job 2: 服务端自动部署镜像
  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - name: Checkout code (sync latest config files)
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull ghcr.io/${{ github.repository }}:latest

      - name: Sync config files to deploy directory
        run: |
          echo "[$(date)] Syncing config files..."
          # 确保 /opt/new-api 目录存在
          mkdir -p /opt/new-api/data /opt/new-api/logs
          # 从仓库 checkout 中同步最新配置文件
          cp -f docker-compose.yml /opt/new-api/docker-compose.yml
          echo "[$(date)] Config files synced!"

      - name: Deploy with docker compose
        run: |
          echo "[$(date)] Starting deployment..."
          cd /opt/new-api
          echo "[$(date)] Pulling latest image..."
          docker compose pull
          echo "[$(date)] Stopping old containers..."
          docker compose down
          echo "[$(date)] Starting new containers..."
          docker compose up -d
          echo "[$(date)] Cleaning up..."
          docker system prune -f
          echo "[$(date)] Deploy completed!"
          docker compose ps
